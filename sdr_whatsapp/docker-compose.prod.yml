services:
  webhook-server:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: sdr-webhook-server
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - WA_SERVER_URL=http://wa-server:3001
      - WA_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sdr-network
    depends_on:
      - wa-server

  wa-server:
    build: ./wa-server
    container_name: sdr-wa-server
    restart: always
    ports:
      - "3001:3001"
    environment:
      - INSTANCE_ID=antigravity-wa
      - WA_PORT=3001
      - WEBHOOK_URL=http://webhook-server:5000/webhook
    volumes:
      - wa-antigravity-auth:/usr/src/app/.wwebjs_auth_antigravity-wa
      - wa-antigravity-cache:/usr/src/app/.wwebjs_cache
    networks:
      - sdr-network

  wa-nicolle-macedo:
    build: ./wa-server
    container_name: sdr-wa-nicolle-macedo
    restart: always
    ports:
      - "3002:3002"
    environment:
      - INSTANCE_ID=nicolle-macedo-wa
      - WA_PORT=3002
      - WEBHOOK_URL=http://webhook-server:5000/webhook
    volumes:
      - wa-nicolle-auth:/usr/src/app/.wwebjs_auth_nicolle-macedo-wa
      - wa-nicolle-cache:/usr/src/app/.wwebjs_cache
    networks:
      - sdr-network

volumes:
  wa-antigravity-auth:
    driver: local
  wa-antigravity-cache:
    driver: local
  wa-nicolle-auth:
    driver: local
  wa-nicolle-cache:
    driver: local

networks:
  sdr-network:
    driver: bridge
